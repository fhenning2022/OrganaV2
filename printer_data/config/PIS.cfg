[mcu PIS]
# Obtain definition by "ls -l /dev/serial/by-id/" then unplug to verify
serial: /dev/serial/by-id/usb-Klipper_rp2040_E66160F42355BD37-if00

[adxl345 bed]
cs_pin: PIS:gpio13
#spi_bus: spi1a
spi_software_sclk_pin: PIS:gpio10
spi_software_mosi_pin: PIS:gpio11
spi_software_miso_pin: PIS:gpio12

[adxl345 hotend]
cs_pin: Toolhead: gpio1
spi_software_sclk_pin: Toolhead: gpio0
spi_software_mosi_pin: Toolhead: gpio3
spi_software_miso_pin: Toolhead: gpio2

[resonance_tester]
accel_chip_x: adxl345 hotend
accel_chip_y: adxl345 bed
accel_per_hz: 100
min_freq: 30
max_freq: 70
probe_points: 110, 110, 50

# uncomment for voron 2.4/Trident 350mm 
#    175,175,20
#
# uncomment for voron v2.4/Trident 300mm
#    150,150,20
# uncomment for voron v2.4/Trident 250mm
#    125,125,20
# uncomment for voron v0
#     60,60,20
# uncomment for Ender 3/Biqu B1
#     117.5,117.5,20
#    50,50,20 #comment if using any of the others